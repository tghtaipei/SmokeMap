name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/smoking-map-website-h5kek"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch map locations from Google My Maps KML
        run: python3 scripts/fetch_locations.py
        continue-on-error: true

      - name: Show locations count
        run: |
          echo "locations.json content preview:"
          head -5 data/locations.json || echo "(file missing)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
